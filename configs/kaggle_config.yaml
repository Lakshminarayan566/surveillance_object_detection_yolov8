# Kaggle Training Configuration

environment:
  platform: Kaggle
  gpu: Tesla T4 x2
  cuda: true

dataset:
  path: /kaggle/working/detection/visdrone_clean/datasets
  train: images/train
  val: images/val
  nc: 10

model:
  architecture: YOLOv8l
  pretrained: yolov8l.pt

training:
  epochs: 70
  batch_size: 12
  image_size: 896
  optimizer: AdamW
  lr0: 0.001

augmentation:
  mosaic: 1.0
  mixup: 0.2
  copy_paste: 0.5
  scale: 0.9
  fliplr: 0.5

output:
  project: runs/detect
  name: defence_kaggle_upgrade
